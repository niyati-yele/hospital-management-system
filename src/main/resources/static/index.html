<!DOCTYPE html>
<html>

<head>

    <title>Hospital Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>

        :root {
            --navy: #0a1628;
            --navy-mid: #122040;
            --teal: #00b4a6;
            --teal-dim: #007d74;
            --cream: #f5f0e8;
            --warm-white: #fdfaf5;
            --muted: #8a9ab5;
            --border: rgba(255,255,255,0.07);
            --row-hover: rgba(0, 180, 166, 0.06);
            --danger: #e05a5a;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--navy);
            color: var(--cream);
            min-height: 100vh;
            padding: 48px 40px;
            position: relative;
            overflow-x: hidden;
        }

        /* Atmospheric background */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            right: -15%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0,180,166,0.12) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0,100,180,0.09) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .page-wrapper {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            margin-bottom: 44px;
            animation: fadeDown 0.6s ease both;
        }

        .header-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--teal);
            margin-bottom: 10px;
        }

        h1 {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(2rem, 5vw, 3rem);
            color: var(--warm-white);
            line-height: 1.1;
            font-weight: 400;
        }

        h1 em {
            font-style: italic;
            color: var(--teal);
        }

        .header-line {
            width: 48px;
            height: 2px;
            background: var(--teal);
            margin-top: 20px;
            border-radius: 2px;
        }

        /* Form card */
        .form-card {
            background: var(--navy-mid);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px 36px;
            margin-bottom: 36px;
            animation: fadeUp 0.6s 0.15s ease both;
        }

        .form-card h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.15rem;
            font-weight: 400;
            color: var(--warm-white);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-card h2::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--teal);
            border-radius: 50%;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 120px 1fr auto;
            gap: 12px;
            align-items: end;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
        }

        input {
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 400;
            padding: 12px 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: var(--cream);
            outline: none;
            width: 100%;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
        }

        input::placeholder {
            color: rgba(138, 154, 181, 0.5);
        }

        input:focus {
            border-color: var(--teal);
            background: rgba(0,180,166,0.05);
            box-shadow: 0 0 0 3px rgba(0,180,166,0.1);
        }

        /* Remove number input arrows */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

        button {
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.04em;
            padding: 12px 24px;
            background: var(--teal);
            color: var(--navy);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background: #00cfc0;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0,180,166,0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button svg {
            width: 15px;
            height: 15px;
        }

        /* Table section */
        .table-section {
            animation: fadeUp 0.6s 0.3s ease both;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .table-header h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--warm-white);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .table-header h2::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--teal);
            border-radius: 50%;
        }

        #patient-count {
            font-size: 12px;
            color: var(--muted);
            background: rgba(255,255,255,0.05);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .table-wrapper {
            background: var(--navy-mid);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead tr {
            background: rgba(0,180,166,0.08);
            border-bottom: 1px solid rgba(0,180,166,0.15);
        }

        th {
            font-size: 10.5px;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--teal);
            padding: 16px 20px;
            text-align: left;
        }

        td {
            padding: 15px 20px;
            font-size: 14px;
            color: var(--cream);
            border-bottom: 1px solid var(--border);
            text-align: left;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        tbody tr {
            transition: background 0.15s;
        }

        tbody tr:hover {
            background: var(--row-hover);
        }

        td:first-child {
            font-size: 12px;
            color: var(--muted);
            font-weight: 500;
            font-variant-numeric: tabular-nums;
        }

        .disease-tag {
            display: inline-block;
            padding: 3px 10px;
            background: rgba(0,180,166,0.1);
            border: 1px solid rgba(0,180,166,0.2);
            border-radius: 20px;
            font-size: 12px;
            color: var(--teal);
        }

        /* Empty state */
        .empty-state {
            padding: 60px 20px;
            text-align: center;
            color: var(--muted);
        }

        .empty-state svg {
            width: 40px;
            height: 40px;
            opacity: 0.3;
            margin-bottom: 12px;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* Animations */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes rowIn {
            from { opacity: 0; transform: translateX(-8px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        tbody tr {
            animation: rowIn 0.3s ease both;
        }

        @media (max-width: 640px) {
            body { padding: 28px 20px; }
            .form-grid { grid-template-columns: 1fr 1fr; }
            button { width: 100%; justify-content: center; }
            .form-grid > button { grid-column: 1 / -1; }
        }

    </style>

</head>

<body>

<div class="page-wrapper">

    <header class="header">
        <div class="header-label">Management Portal</div>
        <h1>Hospital <em>Records</em></h1>
        <div class="header-line"></div>
    </header>

    <!-- Add Patient Form -->
    <div class="form-card">
        <h2>Register Patient</h2>
        <div class="form-grid">
            <div class="field">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="e.g. Priya Sharma">
            </div>
            <div class="field">
                <label>Age</label>
                <input type="number" id="age" placeholder="28">
            </div>
            <div class="field">
                <label>Diagnosis</label>
                <input type="text" id="disease" placeholder="e.g. Hypertension">
            </div>
            <button onclick="addPatient()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Add
            </button>
        </div>
    </div>

    <!-- Patient Table -->
    <div class="table-section">
        <div class="table-header">
            <h2>Patient Records</h2>
            <span id="patient-count">0 patients</span>
        </div>
        <div class="table-wrapper">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Diagnosis</th>
                </tr>
                </thead>
                <tbody id="patientTable"></tbody>
            </table>
        </div>
    </div>

</div>

<script>

    async function loadPatients(){

        try{

            const response = await fetch("/patients");

            const data = await response.json();

            document.getElementById("patient-count").textContent =
                data.length === 1 ? "1 patient" : `${data.length} patients`;

            if(data.length === 0){
                document.getElementById("patientTable").innerHTML = `
                    <tr><td colspan="4">
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                                <circle cx="9" cy="7" r="4"/>
                                <line x1="19" y1="8" x2="19" y2="14"/>
                                <line x1="16" y1="11" x2="22" y2="11"/>
                            </svg>
                            <p>No patients registered yet</p>
                        </div>
                    </td></tr>`;
                return;
            }

            let table = "";

            data.forEach(patient => {

                table += `
                    <tr>
                        <td>#${patient.id}</td>
                        <td>${patient.name}</td>
                        <td>${patient.age}</td>
                        <td><span class="disease-tag">${patient.disease}</span></td>
                    </tr>
                `;
            });

            document.getElementById("patientTable").innerHTML = table;

        }
        catch(error){

            console.log("Error loading patients:", error);
        }
    }

    async function addPatient(){

        const patient = {

            name: document.getElementById("name").value,
            age: document.getElementById("age").value,
            disease: document.getElementById("disease").value
        };

        try{

            await fetch("/patients", {

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body: JSON.stringify(patient)
            });

            document.getElementById("name").value = "";
            document.getElementById("age").value = "";
            document.getElementById("disease").value = "";

            loadPatients();

        }
        catch(error){

            console.log("Error adding patient:", error);
        }
    }

    loadPatients();

</script>

</body>

</html>
